services:
  backend:
    build: ./apps/backend/orchestrator_server
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-echoprint}:${POSTGRES_PASSWORD:-echoprint}@postgres:5432/${POSTGRES_DB:-echoprint}
      REDIS_URL: redis://redis:6379/0
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
    ports:
      - "${BACKEND_PORT:-8011}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend/web
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    ports:
      - "${FRONTEND_PORT:-8010}:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-echoprint}
      POSTGRES_USER: ${POSTGRES_USER:-echoprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-echoprint}
    ports:
      - "${POSTGRES_PORT:-5450}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6400}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
